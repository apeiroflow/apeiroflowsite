<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apeiroflow </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #ffffff;
      --foreground: #0f172a;
      --muted: #f8fafc;
      --muted-foreground: #64748b;
      --border: #e2e8f0;
      --primary: #0f172a;
      --primary-foreground: #ffffff;
      --card: #f8fafc;
      --accent: #10b981;
      --layout-max-width: 1040px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 1px, 1px);
      white-space: nowrap;
      border: 0;
    }
    body {
      margin: 0;
      background-color: var(--background);
      color: var(--foreground);
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }
    header.hero {
      position: relative;
      min-height: 90vh;
      overflow: hidden;
      display: block;
      text-align: center;
      padding: 0 1.5rem 4rem;
      background: #ffffff;
    }
    .hero-backdrop,
    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .hero-backdrop {
      background: url("images/pixelchips.png") center / cover no-repeat;
      opacity: 0.9;
    }
    .hero-overlay {
      background: rgba(255, 255, 255, 0.72);
    }
    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      margin: 0;
      line-height: 1.05;
      position: relative;
      z-index: 1;
      letter-spacing: 0.04em;
    }
    .hero-shell {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 7rem 0 4rem;
    }
    .hero-image {
      width: min(70vw, 680px);
      margin: 2rem auto 0;
      display: block;
      border-radius: 1.5rem;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }
    .section {
      padding: 4.5rem 2rem;
      max-width: var(--layout-max-width);
      margin: auto;
    }

    /* Grain texture overlay */
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .grain-overlay {
        display: none;
      }
    }

    /* === CONTACT FORM — EDITORIAL LETTER DESIGN === */
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 4rem 0;
      position: relative;
    }

    /* Vertical label */
    form::before {
      content: 'INQUIRY';
      position: absolute;
      left: 0;
      top: 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      color: var(--accent);
      opacity: 0.6;
      transform: rotate(180deg);
    }

    /* Form header section */
    .form-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .form-title {
      font-size: clamp(2rem, 5.5vw, 3.5rem);
      font-weight: 300;
      line-height: 0.9;
      margin: 0;
      letter-spacing: -0.03em;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: center;
      gap: 0.5rem 1rem;
    }

    .form-title .line {
      display: block;
      width: 100%;
    }

    .form-title .accent {
      color: var(--accent);
      font-weight: 400;
    }

    /* Form fields container */
    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 2rem;
    }

    .form-field {
      position: relative;
      padding-top: 0.75rem;
    }

    /* Floating label with monospace accent */
    .form-field label {
      position: absolute;
      left: 0;
      top: 0.75rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .form-field label .colon {
      color: var(--accent);
      margin-left: 2px;
    }

    /* Input styling - expands from underline */
    input, textarea, select {
      width: 100%;
      padding: 0.5rem 0;
      font-size: 1rem;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--foreground);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 0;
      box-sizing: border-box;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-bottom-width: 2px;
      padding-bottom: calc(0.5rem - 1px);
    }

    input:focus, textarea:focus, select:focus,
    input:not(:placeholder-shown), textarea:not(:placeholder-shown) {
      border-bottom-color: var(--accent);
    }

    input:focus + label, textarea:focus + label, select:focus + label,
    input:not(:placeholder-shown) + label, textarea:not(:placeholder-shown) + label,
    select:not([value=""]):valid + label {
      top: -0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
    }

    /* Submit button */
    button[type="submit"] {
      padding: 1.25rem 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--primary);
      color: var(--primary-foreground);
      border: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
      border-radius: 0;
    }

    button[type="submit"] span {
      position: relative;
      z-index: 1;
    }

    /* Animated arrow */
    button[type="submit"] .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button[type="submit"] .arrow svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    button[type="submit"]:hover .arrow {
      transform: translateX(4px);
    }

    button[type="submit"]:hover {
      background: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button[type="submit"]:disabled .arrow {
      animation: none;
    }

    button[type="submit"]:disabled:hover {
      background: var(--primary);
      box-shadow: none;
    }

    /* Status message */
    .status {
      grid-column: 1 / -1;
      margin-top: 1rem;
      font-size: 0.85rem;
      min-height: 1.2em;
    }
    .status.success {
      color: var(--accent);
    }
    .status.error {
      color: #ef4444;
    }
    footer {
      padding: 1rem 1rem 1.5rem;
      max-width: var(--layout-max-width);
      margin: 1rem auto 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted-foreground);
      border-top: 1px solid var(--border);
      opacity: 0.85;
    }
    footer p {
      margin: 0;
    }
    .status { 
      margin-top: 0.5rem; 
      font-size: 0.95rem; 
      min-height: 1.2em;
    }
    .status.success { color: #22c55e; }
    .status.error { color: #ef4444; }

    /* Tablet */
    @media (max-width: 768px) {
      header.hero {
        min-height: 80vh;
        padding: 0 1.5rem 3rem;
      }
      .hero-shell {
        padding: 5rem 0 3rem;
      }
      h1 {
        font-size: clamp(2.25rem, 6vw, 4rem);
      }
      .hero-subhead {
        font-size: 0.95rem;
      }
      .section {
        padding: 3.5rem 1.5rem;
      }
      form {
        padding: 2.5rem 0;
        gap: 1.75rem;
      }
      /* Form mobile adjustments */
      form::before {
        left: -1rem;
      }
      .form-title {
        font-size: clamp(2.5rem, 12vw, 4rem);
      }
      .form-fields {
        gap: 1.5rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }

    /* Mobile */
    @media (max-width: 640px) {
      header.hero {
        min-height: 75vh;
        padding: 0 1rem 2rem;
      }
      .hero-shell {
        max-width: 100%;
        padding: 4rem 0 2rem;
      }
      h1 {
        font-size: clamp(2rem, 5.5vw, 3rem);
      }
      .hero-subhead {
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }
      .hero-image {
        width: min(85vw, 500px);
        margin-top: 1.5rem;
        border-radius: 1rem;
      }
      .section {
        padding: 3rem 1rem;
      }
      button,
      input,
      textarea,
      select {
        width: 100%;
      }
      form {
        padding: 2rem 0;
        gap: 1.5rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }
      footer {
        padding: 1.5rem 1rem 2rem;
        margin: 3rem auto 1.5rem;
        font-size: 0.85rem;
      }
    }

    /* Small mobile */
    @media (max-width: 480px) {
      .hero-shell {
        padding: 3rem 0 2rem;
      }
      h1 {
        font-size: clamp(1.75rem, 5vw, 2.5rem);
      }
      .hero-subhead {
        font-size: 0.75rem;
      }
      .section {
        padding: 2.5rem 1rem;
      }
      /* Form small mobile adjustments */
      form::before {
        left: -0.5rem;
        font-size: 0.6rem;
      }
      .form-title {
        font-size: clamp(2rem, 15vw, 3rem);
      }
      .form-subtitle {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>

  <header class="hero">
    <div class="hero-backdrop"></div>
    <div class="hero-overlay"></div>
    <div class="hero-shell">
      <h1>Apeiroflow</h1>
    </div>
    <img class="hero-image" src="images/pixelchips.png" alt="">
  </header>

  <section class="section">
    <form id="contactForm" method="POST" novalidate>
      <div class="form-header">
        <h2 class="form-title">
          <span class="line">Get</span>
          <span class="line">in <span class="accent">Touch.</span></span>
        </h2>
      </div>

      <div class="form-fields">
        <div class="form-grid">
          <div class="form-field">
            <input id="name" type="text" name="name" placeholder=" " required>
            <label for="name">Name<span class="colon">:</span></label>
          </div>
          <div class="form-field">
            <input id="email" type="email" name="email" placeholder=" " required>
            <label for="email">Email<span class="colon">:</span></label>
          </div>
        </div>

        <div class="form-field">
          <textarea id="message" name="message" placeholder=" " rows="4" required></textarea>
          <label for="message">Your message<span class="colon">:</span></label>
        </div>

        <input type="hidden" name="_subject" value="New contact form submission" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

        <button type="submit">
          <span>Send</span>
          <span class="arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </span>
        </button>

        <div id="formStatus" class="status" aria-live="polite"></div>
      </div>
    </form>
  </section>

  <footer>
    <p>© 2026 Apeiroflow.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    // Contact form submission via AJAX to send email to contact@apeiroflow.com
    const form = document.getElementById('contactForm');
    const statusEl = document.getElementById('formStatus');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        statusEl.textContent = '';
        statusEl.className = 'status';
        const submitBtn = form.querySelector('button[type="submit"]');
        const btnText = submitBtn.querySelector('span');
        const btnArrow = submitBtn.querySelector('.arrow');
        submitBtn.disabled = true;
        const originalLabel = btnText.textContent;
        btnText.textContent = 'Sending…';
        if (btnArrow) btnArrow.style.opacity = '0';

        try {
          const formData = new FormData(form);
          const response = await fetch('https://formsubmit.co/ajax/contact@apeiroflow.com', {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
            body: formData
          });
          const status = response.status;
          let data = {};
          try { data = await response.json(); } catch {}

          // Handle first-time verification flow or generic success on 2xx
          if (status >= 200 && status < 300) {
            const message = (data && data.message ? String(data.message) : '').toLowerCase();
            if (message.includes('verify') || message.includes('verification')) {
              statusEl.textContent = 'Please check contact@apeiroflow.com to verify FormSubmit once. After verifying, future messages will deliver.';
            } else if (message.includes('web server')) {
              statusEl.textContent = 'Open the site via http(s) (not a local file). It’s currently running at http://127.0.0.1:5173.';
            } else {
              btnText.textContent = 'Sent!';
              if (btnArrow) {
                btnArrow.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                btnArrow.style.opacity = '1';
              }
              statusEl.textContent = 'Thanks! We'll get back to you shortly.';
            }
            statusEl.classList.add('success');
            form.reset();
          } else {
            throw new Error('Non-2xx response');
          }
        } catch (err) {
          statusEl.textContent = 'Sorry, something went wrong. Please email contact@apeiroflow.com.';
          statusEl.classList.add('error');
        } finally {
          submitBtn.disabled = false;
          if (btnText.textContent !== 'Sent!') {
            btnText.textContent = originalLabel;
          }
          if (btnArrow && btnText.textContent !== 'Sent!') {
            btnArrow.style.opacity = '1';
          }
        }
      });
    }
  </script>
  <script>
    const heroBackdrop = document.querySelector('.hero-backdrop');
    const heroOverlay = document.querySelector('.hero-overlay');
    const heroImage = document.querySelector('.hero-image');
    const heroShell = document.querySelector('.hero-shell');

    if (heroBackdrop && heroOverlay && heroImage && heroShell && window.gsap) {
      const variant = 'fade';

      gsap.set([heroImage, heroShell], { opacity: 0, y: 12 });

      const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });
      tl.to(heroOverlay, { opacity: 0, duration: 2 }, 0)
        .to(heroBackdrop, { opacity: 0, duration: 2.2 }, 0.2)
        .to(heroImage, { opacity: 1, y: 0, duration: 1 }, 1.1)
        .to(heroShell, { opacity: 1, y: 0, duration: 0.9 }, 1.2);
    } else {
      // Fallback: Make hero content visible if GSAP doesn't load
      if (heroImage) heroImage.style.opacity = '1';
      if (heroShell) heroShell.style.opacity = '1';
      if (heroOverlay) heroOverlay.style.opacity = '0';
      if (heroBackdrop) heroBackdrop.style.opacity = '0.9';
    }
  </script>
  <script>
    // Scroll-triggered animations using Intersection Observer
    const observerOptions = {
      threshold: 0.15,
      rootMargin: '0px 0px -50px 0px'
    };

    const scrollObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
          scrollObserver.unobserve(entry.target);
        }
      });
    }, observerOptions);

    // Animate form on scroll
    const form = document.querySelector('form');
    if (form) {
      form.style.opacity = '0';
      form.style.transform = 'translateY(20px)';
      form.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
      scrollObserver.observe(form);
    }
  </script>
</body>
</html>
